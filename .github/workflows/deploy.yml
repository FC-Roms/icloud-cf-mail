name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Ensure wrangler (v2) available
        run: npm install -g wrangler@latest

      - name: Put VIEW_TOKEN as a worker secret (non-interactive)
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          VIEW_TOKEN: ${{ secrets.VIEW_TOKEN }}
        run: |
          echo -n "$VIEW_TOKEN" | npx wrangler secret put VIEW_TOKEN --raw --account-id $CF_ACCOUNT_ID

      - name: Publish to Cloudflare Workers
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx wrangler publish --account-id $CF_ACCOUNT_ID
